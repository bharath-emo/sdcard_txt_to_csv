name: Process Battery Data from Dropbox

on:
  workflow_dispatch: 

jobs:
  process-data:
    runs-on: ubuntu-latest

    steps:
      # Updated from v3 to v4 to fix Node 20 deprecation warning
      - name: Checkout code
        uses: actions/checkout@v4

      # Updated from v4 to v5 to fix Node 20 deprecation warning
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install dropbox

      - name: Run Processing Script
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: python process_dropbox.py
